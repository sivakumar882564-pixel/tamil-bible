name: Build Tamil Bible APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Generate gradlew if missing
        run: |
          if [ ! -f "gradlew" ]; then
            echo "gradlew not found â€” generating via Gradle wrapper task"
            gradle wrapper --gradle-version 8.2 --distribution-type bin
          fi
          chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: TamilBible-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 90

      - name: Check release signing secrets
        id: secrets_check
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "has_secrets=true" >> $GITHUB_OUTPUT
          else
            echo "has_secrets=false" >> $GITHUB_OUTPUT
          fi

      - name: Decode keystore
        if: steps.secrets_check.outputs.has_secrets == 'true'
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks

      - name: Build Release APK
        if: steps.secrets_check.outputs.has_secrets == 'true'
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload Release APK
        if: steps.secrets_check.outputs.has_secrets == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: TamilBible-Release-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Build Summary
        run: |
          find app/build/outputs/apk -name "*.apk" | while read f; do
            echo "$(basename $f) â€” $(du -h $f | cut -f1)"
          done
